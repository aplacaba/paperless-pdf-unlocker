image:
  repository: ghcr.io/aplacaba/paperless-pdf-unlocker
  tag: master
  pullPolicy: IfNotPresent

resources:
  limits:
    memory: 128Mi
  requests:
    memory: 64Mi

config:
  paperlessUrl: http://paperless.local:30080
  paperlessToken: ""
  passwordCandidates: ""
  lockedTag: locked
  unlockFailedTag: unlock-failed
  pollIntervalSeconds: "60"
  httpTimeoutSeconds: "30"
  logLevel: info
  skipSslVerify: "1"

hostAliases: []
# - ip: 192.168.254.50
#   hostnames:
#     - paperless.local
